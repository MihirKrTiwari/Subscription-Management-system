<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription Manager</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app-shell">
        <header><h1>Subscription Manager</h1></header>
        <main>
            <section class="dashboard">
                <div class="card" id="card-total">
                    <h3>Total Monthly Cost</h3>
                    <p id="total-monthly">$0.00</p>
                </div>
                <div class="card" id="card-upcoming">
                    <h3>Upcoming Payments</h3>
                    <ul id="upcoming-list"></ul>
                </div>
                <div class="card" id="card-summary">
                    <h3>Summary</h3>
                    <canvas id="chartCategory" width="300" height="150"></canvas>
                    <canvas id="chartStatus" width="300" height="150"></canvas>
                </div>
            </section>

            <section>
                <div class="card">
                    <h2 id="form-title">Add Subscription</h2>
                    <form id="subscription-form">
                        <input type="hidden" id="sub-id" />
                        <label>Name<input type="text" id="name" required /></label>
                        <label>Category<input type="text" id="category" required /></label>
                        <label>Cost<input type="number" id="cost" min="0.01" step="0.01" required /></label>
                        <label>Billing Cycle<select id="billingCycle" required><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select></label>
                        <label>Next Billing Date<input type="date" id="nextBillingDate" required /></label>
                        <label>Notes<textarea id="notes"></textarea></label>
                        <label>Status<select id="status" required><option>Active</option><option>Paused</option><option>Canceled</option></select></label>
                        <div class="form-actions">
                            <button type="submit">Save</button>
                            <button type="button" id="cancel-edit" class="secondary">Cancel</button>
                        </div>
                        <div class="form-error" id="form-error"></div>
                    </form>
                </div>
            </section>

            <section>
                <div class="card">
                    <h2>Subscriptions</h2>
                    <div id="subscription-list" class="cards-grid"></div>
                </div>
            </section>
        </main>
        <footer>Built with Spring Boot + CSV + Vanilla JS</footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
