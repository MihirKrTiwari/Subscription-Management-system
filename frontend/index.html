<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Subscription Management System</h1>
        </header>
        <nav>
            <button id="homeBtn">Home</button>
            <button id="dashboardBtn">Dashboard</button>
            <button id="manageBtn">Manage Subscription</button>
        </nav>
        <main>
            <!-- Home Page: Display Plans -->
            <section id="homePage" class="page">
                <h2>Choose a Plan</h2>
                <div id="plansContainer" class="plans-container">
                    <!-- Plans will be loaded here by JavaScript -->
                </div>
            </section>

            <!-- Dashboard Page: Show Current Subscription -->
            <section id="dashboardPage" class="page" style="display:none;">
                <h2>Your Dashboard</h2>
                <div id="userInfo">
                    <!-- User info and current subscription will be displayed here -->
                </div>
                <button id="upgradeDowngradeBtn">Upgrade/Downgrade Plan</button>
                <button id="cancelSubscriptionBtn">Cancel Subscription</button>
            </section>

            <!-- Manage Subscription Page: Subscribe, Upgrade, Downgrade, Cancel -->
            <section id="managePage" class="page" style="display:none;">
                <h2>Manage Your Subscription</h2>
                <form id="subscriptionForm">
                    <div>
                        <label for="userId">User ID:</label>
                        <input type="text" id="userId" name="userId" required>
                    </div>
                    <div>
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div>
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div>
                        <label for="planSelect">Select a Plan:</label>
                        <select id="planSelect" name="planSelect" required>
                            <!-- Plan options will be loaded here -->
                        </select>
                    </div>
                    <button type="submit">Subscribe</button>
                </form>
                <div id="formMessage"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
